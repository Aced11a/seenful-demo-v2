# LLM Judge 配置 (ADR-0020)
# Provider 切换 (优先级: env var SEENFUL_LLM_MODE > config provider):
#   - mock (默认, 跑测试用): MockJudge
#   - qwen: QwenJudge (DashScope qwen-turbo)
#   - anthropic: AnthropicJudge (v0.2 备选)

provider: qwen                    # mock | qwen | anthropic (ADR-0020 切真)

# Qwen 段 (ADR-0020)
qwen:
  endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-turbo               # qwen-turbo | qwen-plus | qwen-max
  api_key_env: DASHSCOPE_API_KEY  # 从 env var 读 API key
  temperature: 0.0                # 确定性
  top_p: 1.0
  seed: 42
  max_tokens: 1024
  timeout_s: 30
  retry_max: 2
  enable_thinking: false          # Qwen3 no-thinking 模式
  graceful_degrade_to_mock: true  # 失败时自动退回 MockJudge

# Anthropic 段 (备选)
anthropic:
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY
  temperature: 0.0
  max_tokens: 1024
  timeout_s: 30
  retry_max: 2

# Mock 行为 (v0.1 demo)
mock:
  strategy: bounds_min
  default_evidence_count: 3
  default_counter_evidence: "v0.1 mock 阶段, counter_evidence 占位"
  default_confidence_adjustment: 0.0

