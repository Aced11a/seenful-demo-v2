# pilot · cascade 路径 · 张奶奶阳台单张 vs 沉淀池(阳台花)→ create_new_album
# 溯源: tests/personas/scenarios/CB_05_zhang_balcony_recall.yaml
# 产品意图: 新照(花苞 z32)触发回扫, 召回池中 3 张同主题(阳台花 z01/z03/z06),
#           z08(餐厅朋友)主题不齐, 不应被召回 → create_new_album(新建集 4 张 = 3 召回 + 1 trigger)
# 选作 cascade pilot 的理由: 池 4 张里 3 同 1 异, 召回精度好验; 主题驱动(balcony/flower/bud)
#   无 GPS 也成立(zhang 家阳台高频但本轮没 hfp 信号 → 不依赖位置)。
id: zhang_cascade_balcony_recall
source_scenario: CB_05_zhang_balcony_recall.yaml
persona: laoqi_zhang
path: cascade
verdict: runnable
setup:
  pool_photos: [z01, z03, z06, z08]   # 4 张沉淀池: 3 同主题(花/盆栽) + 1 干扰(z08 餐厅)
  setup_rationale: |
    z01 bud/dewdrop/morning_light + 牡丹花苞(同主题)
    z03 closeup/blur/retake + 白兰花(同主题, 质量差是次要)
    z06 potted_plant/geranium/terracotta_pot + 天竺葵盆(同主题)
    z08 meal/restaurant/friend + 老同学聚餐(干扰项, 不应召回)
    单张分批上传 → 期望每张孤立不成集(无同批同主题伙伴), 落库后台子状态就是 4 张沉淀池.
trigger:
  photos: [z32]                       # 单张触发: bud/second_round/hope_again/flower_pot/balcony
expected:
  decision_tier: create_new_album     # cascade 期望: 召回同主题, 新建 4 张集
  min_recalled: 3                     # 至少召回 3 张同主题(z01/z03/z06), z08 不算
invariants: [INV-01, INV-04, INV-05, INV-06]
notes: |
  cascade 基础正例. 若后端召回了 z08(餐厅) → 主题精度问题 (mismatch).
  若召回 <3 张 → 后端 cascade 阈值高 / 主题相似度门槛严, 记 mismatch.
  若 z01/z03/z06 都没召回 → 后端 cascade 无效或主题维度无信号, 记 mismatch.
